name: CD

on:
  push:
    branches: [main]

jobs:
  push-images:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push serving image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.serving
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mlops-serving:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mlops-serving:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push training image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.training
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mlops-training:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mlops-training:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push monitoring image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.monitoring
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mlops-monitoring:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mlops-monitoring:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Images pushed" >> $GITHUB_STEP_SUMMARY
          echo "- \`mlops-serving:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`mlops-training:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`mlops-monitoring:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
