# Model hyperparameters and feature configuration
model:
  name: churn_model
  type: xgboost

hyperparameters:
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 5
  eval_metric: logloss
  random_state: 42
  n_jobs: -1

features:
  numeric:
    - age
    - tenure_months
    - monthly_charge
    - num_products
  categorical:
    - contract_type
    - payment_method
  engineered:
    - charge_per_tenure
    - products_per_year
  target: churned
