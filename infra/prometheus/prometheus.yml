global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: churn_api
    static_configs:
      - targets: ["serving:8000"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: mlflow
    static_configs:
      - targets: ["mlflow:5000"]
    metrics_path: /metrics
    scrape_interval: 30s
