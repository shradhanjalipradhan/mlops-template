global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: webhook-retrain
  routes:
    - matchers:
        - alertname = "DriftThresholdExceeded"
      receiver: webhook-retrain
    - matchers:
        - alertname = "DatasetDriftDetected"
      receiver: webhook-retrain
    - matchers:
        - severity = "critical"
      receiver: webhook-retrain

receivers:
  - name: webhook-retrain
    webhook_configs:
      - url: "http://airflow-webserver:8080/api/v1/dags/retrain_dag/dagRuns"
        http_config:
          basic_auth:
            username: admin
            password: admin
        send_resolved: false
        max_alerts: 1

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["alertname"]
